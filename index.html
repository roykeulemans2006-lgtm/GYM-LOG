<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F14">
<title>Iron Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --bg:#0A0F14;--surface:#121A22;--surface2:#18232E;--line:#28384A;
    --text:#E6F1F8;--muted:#7E94A6;--molten:#25E0D4;--steel:#4FB0E0;--gold:#F2B544;--danger:#FF6A5A;--ink:#042020;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;}
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:env(safe-area-inset-bottom);}
  .num{font-family:'Oswald',system-ui,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
  input,select,button{font-family:inherit;color:inherit;}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 12px;font-size:15px;}
  ::placeholder{color:var(--muted);opacity:1;}
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--molten);outline-offset:1px;}
  label.lbl{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:500;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .stack{display:grid;gap:14px;}
  .row{display:flex;gap:10px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:9px;
    padding:12px 14px;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--molten);color:var(--ink);}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line);font-weight:500;font-size:14px;padding:11px 14px;}
  .btn-big{padding:16px;font-size:16px;border-radius:12px;}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:grid;place-items:center;line-height:0;}
  .muted{color:var(--muted);}
  header.top{padding:22px 16px 14px;display:flex;align-items:center;gap:10px;}
  .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--molten);color:var(--ink);font-size:18px;}
  .content{padding:0 16px 100px;}
  nav.bottom{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(21,17,14,.94);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding:8px 2px calc(14px + env(safe-area-inset-bottom));}
  nav.bottom button{flex:1;background:none;border:none;cursor:pointer;color:var(--muted);display:grid;
    justify-items:center;gap:4px;padding:6px 0;font-size:10px;font-weight:500;}
  nav.bottom button.active{color:var(--molten);font-weight:600;}
  nav.bottom .ic{font-size:18px;line-height:1;}
  .chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:var(--surface);color:var(--muted);}
  .chip.active{border-color:var(--molten);background:rgba(37,224,212,.14);color:var(--molten);}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .setrow{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:7px 10px;}
  .listrow{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:9px 11px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-l{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;}
  .stat-v{font-size:24px;font-weight:700;margin-top:4px;}
  .banner{margin:0 16px 12px;padding:10px 12px;border-radius:10px;font-size:12.5px;display:flex;gap:8px;align-items:center;}
  .banner-ok{background:rgba(95,168,201,.12);border:1px solid var(--steel);color:#bfe2f0;}
  .banner-go{background:rgba(37,224,212,.13);border:1px solid var(--molten);color:#cdeef0;cursor:pointer;font-weight:600;}
  .banner-err{background:rgba(224,87,62,.12);border:1px solid var(--danger);color:#F3B4A6;}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--line);color:var(--steel);padding:7px 13px;border-radius:20px;font-size:12.5px;
    font-weight:500;z-index:30;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
  .entry{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
  .badge-pr{background:rgba(232,178,58,.16);color:var(--gold);border:1px solid rgba(232,178,58,.4);}
  .live{font-family:'Oswald',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
  .sess-head{display:flex;align-items:center;gap:10px;cursor:pointer;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:0;}
  .plates-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px;}
  .plate{flex-shrink:0;min-width:46px;padding:10px 6px;border-radius:9px;font-weight:700;font-family:'Oswald',sans-serif;
    font-size:15px;letter-spacing:.3px;border:1px solid var(--line);background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;}
  .plate:active{background:var(--molten);color:var(--ink);border-color:var(--molten);}
  .pside{display:flex;flex-wrap:wrap;gap:5px;}
  .ppill{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--line);
    border-radius:7px;padding:4px 5px 4px 9px;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;}
  .tag{flex-shrink:0;padding:5px 9px;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--surface2);color:var(--muted);}
  .tag.on{border-color:var(--molten);color:var(--molten);background:rgba(37,224,212,.12);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div id="root">
  <header class="top">
    <div class="logo">🏋</div>
    <div>
      <div class="num" id="title" style="font-size:22px;font-weight:700;line-height:1;">Training</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">IRON LOG</div>
    </div>
  </header>
  <div id="banner"></div>
  <div class="content" id="content"></div>
  <nav class="bottom" id="nav"></nav>
</div>
<div class="toast" id="toast">✓ Opgeslagen</div>

<script>
"use strict";

/* ====================================================================
   STORAGE  (localStorage, key behouden zodat oude data blijft bestaan)
   Nieuw model:
     exercises: [{id,name}]
     schemas:   [{id,name,exerciseIds:[]}]          (sjablonen)
     sessions:  [{id,date,startedAt,finishedAt,name,legacy?,
                  entries:[{exerciseId, sets:[{id,reps,weight,pr?}]}]}]
     active:    null | {id,startedAt,name,schemaId,entries:[...]}   (lopende training)
   Migratie van oud model (exercises, sets[], workouts[]) gebeurt bij load.
==================================================================== */
const KEY = "ironlog_v1";
let storageOK = true;

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return {exercises:[],schemas:[],sessions:[],active:null,settings:defSettings()};
    const d = JSON.parse(raw);
    if(Array.isArray(d.sessions)){
      // al nieuw formaat
      return {
        exercises: d.exercises||[],
        schemas:   d.schemas||[],
        sessions:  d.sessions||[],
        active:    d.active||null,
        settings:  Object.assign(defSettings(), d.settings||{})
      };
    }
    // --- oud formaat -> migreren ---
    return {
      exercises: d.exercises||[],
      schemas:   d.workouts||[],
      sessions:  setsToSessions(d.sets||[]),
      active:    null,
      settings:  defSettings()
    };
  }catch(e){ storageOK=false; return {exercises:[],schemas:[],sessions:[],active:null,settings:defSettings()}; }
}
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify({
      exercises:S.exercises, schemas:S.schemas, sessions:S.sessions, active:S.active, settings:S.settings
    }));
    storageOK=true; toast("✓ Opgeslagen");
  }catch(e){ storageOK=false; render(); }
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove("show"),1500);
}

/* ---------------- helpers ---------------- */
const uid = ()=> (crypto.randomUUID? crypto.randomUUID() : String(Date.now())+Math.random().toString(16).slice(2));
const e1rm = (w,r)=> r<=1? w : w*(1+r/30);
const esc = s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

/* ---- platen ---- */
const ALL_PLATES=[25,20,15,10,5,2.5,1.25,0.5];
function defSettings(){return {plates:[25,20,15,10,5,2.5,1.25], bar:20};}
function isBar(ex){return ex && typeof ex.bar==="number";}
function plateTotal(bar,stack){return Math.round((bar + 2*(stack||[]).reduce((a,p)=>a+p,0))*100)/100;}
function breakdownStr(ps){
  if(!ps||!ps.length) return "alleen stang";
  const m={}; ps.forEach(p=>{m[p]=(m[p]||0)+1;});
  return Object.keys(m).map(Number).sort((a,b)=>b-a).map(p=>m[p]+"×"+p).join(" · ")+" /kant";
}
function calcLoad(total,bar,avail){
  let per=(total-bar)/2; if(per<=0.01) return [];
  const ps=(avail||defSettings().plates).slice().sort((a,b)=>b-a); const out=[];
  for(const p of ps){ while(per>=p-1e-9){ out.push(p); per-=p; } }
  return out;
}
function setSuffix(s){ return (s.plates&&s.plates.length)? ` <span class="muted" style="font-size:10.5px;">(${breakdownStr(s.plates)})</span>` : ""; }

function dayKey(ts){const d=new Date(ts);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayKey(){return dayKey(Date.now());}
function tsFromKey(k){const p=k.split("-").map(Number);return new Date(p[0],p[1]-1,p[2],12,0,0).getTime();}

const WD=["zo","ma","di","wo","do","vr","za"];
const MO=["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
function dateLong(ts){const d=new Date(ts);return WD[d.getDay()]+" "+d.getDate()+" "+MO[d.getMonth()];}
function dateShort(ts){const d=new Date(ts);return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");}
function clockTime(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function fmtDur(ms){ if(!ms||ms<=0) return "—"; const m=Math.round(ms/60000); if(m<1) return "<1 min"; if(m<60) return m+" min"; const h=Math.floor(m/60),mm=m%60; return h+"u"+(mm?" "+mm+"m":""); }
function liveDur(ms){ const s=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; const p=n=>String(n).padStart(2,"0"); return h>0? h+":"+p(m)+":"+p(sec) : m+":"+p(sec); }

function setsToSessions(sets){
  const byDate={};
  sets.forEach(s=>{(byDate[s.date]=byDate[s.date]||[]).push(s);});
  return Object.keys(byDate).sort().map(dk=>{
    const entries=[];
    byDate[dk].forEach(s=>{
      let en=entries.find(e=>e.exerciseId===s.exerciseId);
      if(!en){en={exerciseId:s.exerciseId,sets:[]};entries.push(en);}
      en.sets.push({id:s.id||uid(),reps:s.reps,weight:s.weight});
    });
    const ts=tsFromKey(dk);
    return {id:uid(),date:dk,startedAt:ts,finishedAt:ts,legacy:true,name:"",entries};
  });
}

const STARTER=["Bench press","Squat","Deadlift","Overhead press","Barbell row","Pull-up","Lat pulldown","Biceps curl","Triceps pushdown","Leg press"];

/* ---------------- state ---------------- */
let S = load();
if(!S.exercises || !S.exercises.length){
  S.exercises = STARTER.map(n=>({id:uid(),name:n}));
  save();
} else if(!localStorage.getItem(KEY+"__migrated") ){
  // schrijf gemigreerde structuur één keer terug
  try{ localStorage.setItem(KEY, JSON.stringify({exercises:S.exercises,schemas:S.schemas,sessions:S.sessions,active:S.active,settings:S.settings}));
       localStorage.setItem(KEY+"__migrated","1"); }catch(e){}
}
if(!S.settings) S.settings=defSettings();
S.ui = { tab:"train", startSchema:"", editor:null, progEx:"", openSession:null, addExSel:"", reps:{}, plates:{}, openEx:null };

/* ---------------- afgeleide data ---------------- */
function exName(id){const e=S.exercises.find(x=>x.id===id);return e?e.name:"?";}
function allSetsFor(exId){
  const out=[];
  S.sessions.forEach(ses=>ses.entries.forEach(en=>{ if(en.exerciseId===exId) en.sets.forEach(st=>out.push({reps:st.reps,weight:st.weight,ts:ses.startedAt})); }));
  return out;
}
function bestE1rm(exId){ let b=0; allSetsFor(exId).forEach(s=>{const v=e1rm(s.weight,s.reps); if(v>b)b=v;}); return b; }
function lastTime(exId){
  const rel=S.sessions.filter(s=>s.entries.some(en=>en.exerciseId===exId && en.sets.length))
                      .sort((a,b)=>(b.startedAt||0)-(a.startedAt||0));
  if(!rel.length) return null;
  const en=rel[0].entries.find(e=>e.exerciseId===exId);
  return {ts:rel[0].startedAt, sets:en.sets};
}
function sessStats(ses){
  let sets=0,vol=0,prs=0,exs=0;
  ses.entries.forEach(en=>{ if(en.sets.length)exs++; en.sets.forEach(st=>{sets++;vol+=st.reps*st.weight; if(st.pr)prs++;}); });
  return {exs,sets,vol:Math.round(vol),prs};
}

/* ---------------- mutations: exercises & schemas ---------------- */
function addExercise(name){
  name=name.trim(); if(!name) return null;
  const ex=S.exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
  if(ex) return ex.id;
  const id=uid(); S.exercises.push({id,name}); save(); return id;
}
function removeExercise(id){
  S.exercises=S.exercises.filter(e=>e.id!==id);
  S.sessions.forEach(ses=>ses.entries=ses.entries.filter(en=>en.exerciseId!==id));
  S.schemas.forEach(sc=>sc.exerciseIds=sc.exerciseIds.filter(x=>x!==id));
  save();
}
function saveSchema(sc){ const i=S.schemas.findIndex(x=>x.id===sc.id); if(i>=0)S.schemas[i]=sc; else S.schemas.push(sc); save(); }
function deleteSchema(id){ S.schemas=S.schemas.filter(s=>s.id!==id); save(); }
function setExerciseBar(id,bar){ const e=S.exercises.find(x=>x.id===id); if(!e)return; if(bar==null) delete e.bar; else e.bar=bar; save(); }

/* ---------------- mutations: training-sessie ---------------- */
function startTraining(schemaId){
  const sc = schemaId? S.schemas.find(s=>s.id===schemaId) : null;
  S.active = {
    id:uid(), startedAt:Date.now(),
    schemaId: sc? sc.id:"", name: sc? sc.name:"",
    entries: sc? sc.exerciseIds.map(id=>({exerciseId:id,sets:[]})) : []
  };
  S.ui.tab="train"; save(); render();
}
function activeAddExercise(exId){
  if(!S.active||!exId) return;
  if(!S.active.entries.some(e=>e.exerciseId===exId)) S.active.entries.push({exerciseId:exId,sets:[]});
  save();
}
function activeRemoveEntry(exId){ if(!S.active)return; S.active.entries=S.active.entries.filter(e=>e.exerciseId!==exId); save(); }
function activeAddSet(exId,reps,weight,plates,bar){
  if(!S.active) return false;
  let best=bestE1rm(exId);
  const en0=S.active.entries.find(e=>e.exerciseId===exId);
  if(en0) en0.sets.forEach(st=>{const v=e1rm(st.weight,st.reps); if(v>best)best=v;});
  const isPR = e1rm(weight,reps) > best+0.01;
  let en=S.active.entries.find(e=>e.exerciseId===exId);
  if(!en){en={exerciseId:exId,sets:[]};S.active.entries.push(en);}
  const st={id:uid(),reps,weight,pr:isPR};
  if(plates){ st.plates=plates; st.bar=bar; }
  en.sets.push(st);
  save(); return isPR;
}
function activeDelSet(exId,setId){
  if(!S.active)return;
  const en=S.active.entries.find(e=>e.exerciseId===exId);
  if(en) en.sets=en.sets.filter(s=>s.id!==setId);
  save();
}
function finishTraining(){
  const a=S.active; if(!a) return;
  a.entries=a.entries.filter(en=>en.sets.length>0);
  if(!a.entries.length){ S.active=null; save(); render(); return; }
  S.sessions.push({id:a.id,date:dayKey(a.startedAt),startedAt:a.startedAt,finishedAt:Date.now(),name:a.name||"",entries:a.entries});
  S.active=null; S.ui.tab="history"; S.ui.openSession=a.id; save(); render();
}
function discardTraining(){ S.active=null; save(); render(); }
function deleteSession(id){ S.sessions=S.sessions.filter(s=>s.id!==id); save(); }

/* ---------------- export / import ---------------- */
function exportData(){
  const blob=new Blob([JSON.stringify({exercises:S.exercises,schemas:S.schemas,sessions:S.sessions,settings:S.settings},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="iron-log-backup.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.exercises) S.exercises=d.exercises;
      if(d.settings) S.settings=Object.assign(defSettings(),d.settings);
      if(Array.isArray(d.sessions)){ S.schemas=d.schemas||S.schemas; S.sessions=d.sessions; }
      else { if(d.workouts) S.schemas=d.workouts; if(d.sets) S.sessions=setsToSessions(d.sets); }
      S.active=null; S.ui.editor=null; save(); render();
    }catch(e){ alert("Kon dit bestand niet lezen."); }
  };
  r.readAsText(file);
}

/* ---------------- nav ---------------- */
const TABS=[
  {id:"train",label:"Training",ic:"＋"},
  {id:"history",label:"Historie",ic:"🕘"},
  {id:"progress",label:"Grafiek",ic:"📈"},
  {id:"schemas",label:"Schema's",ic:"▤"},
  {id:"exercises",label:"Oefening",ic:"≣"},
];
function title(){
  if(S.ui.tab==="train") return S.active? "Bezig…" : "Training";
  return {history:"Historie",progress:"Vooruitgang",schemas:"Schema's",exercises:"Oefeningen"}[S.ui.tab];
}

/* ---------------- render ---------------- */
function render(){
  document.getElementById("title").textContent=title();

  const b=document.getElementById("banner");
  if(!storageOK){
    b.innerHTML='<div class="banner banner-err">⚠ Opslaan lukt niet in deze browser. Gebruik de back-up-knop onderaan "Oefeningen" om je data te bewaren.</div>';
  } else if(S.active && S.ui.tab!=="train"){
    b.innerHTML='<div class="banner banner-go" data-resume>▶ Training loopt nog — tik om verder te gaan</div>';
  } else b.innerHTML="";

  document.getElementById("nav").innerHTML = TABS.map(t=>{
    const dot = (t.id==="train" && S.active)? '<span style="position:absolute;top:2px;margin-left:18px;width:7px;height:7px;border-radius:50%;background:var(--molten);"></span>':'';
    return `<button data-tab="${t.id}" class="${S.ui.tab===t.id?'active':''}" style="position:relative;"><span class="ic">${t.ic}${dot}</span>${t.label}</button>`;
  }).join("");

  const c=document.getElementById("content");
  if(S.ui.tab==="train")        c.innerHTML = S.active? viewActive() : viewStart();
  else if(S.ui.tab==="history") c.innerHTML = viewHistory();
  else if(S.ui.tab==="progress")c.innerHTML = viewProgress();
  else if(S.ui.tab==="schemas") c.innerHTML = S.ui.editor? viewEditor() : viewSchemas();
  else                          c.innerHTML = viewExercises();

  wire();
}

/* ---------- TRAINING: startscherm ---------- */
function viewStart(){
  const last = S.sessions.slice().sort((a,b)=>b.startedAt-a.startedAt)[0];
  let lastCard="";
  if(last){
    const st=sessStats(last);
    lastCard=`<div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Laatste training</div>
        <div style="font-size:15px;font-weight:600;margin-top:3px;">${dateLong(last.startedAt)}${last.name?` · ${esc(last.name)}`:""}</div>
        <div class="muted" style="font-size:12px;margin-top:3px;">${st.exs} oefeningen · ${st.sets} sets · ${st.vol} kg</div>
      </div>
      <button class="icon-btn" data-tabjump="history" style="color:var(--steel);font-size:13px;font-weight:600;">Historie ›</button>
    </div>`;
  }
  const chips = `<div class="chips">
      <button class="chip ${!S.ui.startSchema?'active':''}" data-ss="">Vrij</button>
      ${S.schemas.map(sc=>`<button class="chip ${S.ui.startSchema===sc.id?'active':''}" data-ss="${sc.id}">${esc(sc.name)}</button>`).join("")}
    </div>`;
  const sel = S.schemas.find(s=>s.id===S.ui.startSchema);

function entryCard(en){
  const ex=S.exercises.find(e=>e.id===en.exerciseId)||{};
  const bar=isBar(ex);
  const lt=lastTime(en.exerciseId);
  let last="";
  if(lt){
    let extra="";
    if(bar){
      const top=lt.sets.reduce((a,s)=>s.weight>a.weight?s:a,lt.sets[0]);
      const load = (top.plates&&top.plates.length)? breakdownStr(top.plates) : breakdownStr(calcLoad(top.weight,ex.bar,S.settings.plates));
      extra=` <span style="color:var(--muted);">· laad ${load}</span>`;
    }
    last=`<div class="muted" style="font-size:12px;margin:2px 0 10px;"><span style="color:var(--steel);font-weight:600;">Vorige keer (${dateShort(lt.ts)}): </span>${lt.sets.map(s=>s.reps+"×"+s.weight).join("  ·  ")}${extra}</div>`;
  }
  const sets = en.sets.length? `<div class="stack" style="gap:5px;margin-bottom:10px;">${en.sets.map((s,i)=>`
      <div class="setrow">
        <span class="muted" style="font-size:12px;width:16px;">${i+1}</span>
        <span class="num" style="font-size:16px;">${s.reps}<span class="muted" style="font-size:12px;"> reps</span></span>
        <span style="color:var(--line);">·</span>
        <span class="num" style="font-size:16px;">${s.weight}<span class="muted" style="font-size:12px;"> kg</span></span>
        ${s.pr?'<span class="badge badge-pr" style="margin-left:6px;">🏅 PR</span>':''}${setSuffix(s)}
        <span class="muted" style="margin-left:auto;font-size:11px;">~${Math.round(e1rm(s.weight,s.reps))}</span>
        <button class="icon-btn" data-delset="${en.exerciseId}|${s.id}" aria-label="Verwijder">🗑</button>
      </div>`).join("")}</div>` : "";

  let inputBlock;
  if(bar){
    const stack=S.ui.plates[en.exerciseId]||[];
    const avail=S.settings.plates.slice().sort((a,b)=>b-a);
    const total=plateTotal(ex.bar,stack);
    const pills = stack.length? stack.map((p,i)=>`<span class="ppill">${p}<button class="icon-btn" data-rmplate="${en.exerciseId}|${i}" style="padding:0 3px;color:var(--danger);font-size:12px;">✕</button></span>`).join("")
                  : `<span class="muted" style="font-size:12px;">nog geen platen — alleen de stang (${ex.bar} kg)</span>`;
    inputBlock=`
      <label class="lbl">Platen per kant tikken — stang ${ex.bar} kg</label>
      <div class="plates-row">${avail.map(p=>`<button class="plate" data-plate="${en.exerciseId}|${p}">${p}</button>`).join("")}</div>
      <div class="pside" style="margin:9px 0 4px;">${pills}${stack.length?`<button class="tag" data-clearp="${en.exerciseId}" style="margin-left:4px;">leeg</button>`:""}</div>
      <div class="row" style="margin-top:10px;align-items:flex-end;">
        <div style="flex:1;"><label class="lbl">Reps</label><input id="reps_${en.exerciseId}" data-reps="${en.exerciseId}" inputmode="numeric" placeholder="reps" value="${esc(S.ui.reps[en.exerciseId]||'')}"></div>
        <div style="flex:1;text-align:center;padding-bottom:2px;"><div class="muted" style="font-size:10.5px;">totaal</div><div class="num" style="font-size:22px;font-weight:700;color:var(--molten);" id="ptot_${en.exerciseId}">${total} kg</div></div>
        <button class="btn btn-primary" data-addsetto="${en.exerciseId}" style="padding:0 16px;height:44px;">＋</button>
      </div>`;
  } else {
    inputBlock=`
      <div class="row" style="align-items:flex-end;">
        <div style="flex:1;"><label class="lbl">Reps</label><input id="reps_${en.exerciseId}" data-reps="${en.exerciseId}" inputmode="numeric" placeholder="reps" value="${esc(S.ui.reps[en.exerciseId]||'')}"></div>

      </div>`;
  }

  return `<div class="entry">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:15px;font-weight:600;flex:1;">${esc(ex.name||"?")}${bar?` <span class="muted" style="font-size:11px;font-weight:500;">· stang</span>`:""}</span>

/* ---------- GRAFIEK ---------- */
function viewProgress(){
  const withData=S.exercises.filter(e=>S.sessions.some(ses=>ses.entries.some(en=>en.exerciseId===e.id && en.sets.length)));
  if(!withData.length) return `<div class="card muted" style="text-align:center;padding:30px;">Nog geen data. Rond eerst een training af, dan verschijnt hier je curve.</div>`;
  if(!S.ui.progEx || !withData.some(e=>e.id===S.ui.progEx)) S.ui.progEx=withData[0].id;
  const exId=S.ui.progEx;
  const rows=allSetsFor(exId);

  const rel=S.sessions.filter(ses=>ses.entries.some(en=>en.exerciseId===exId && en.sets.length));
  const data=rel.map(ses=>{
    let best=0; ses.entries.filter(en=>en.exerciseId===exId).forEach(en=>en.sets.forEach(st=>{const v=e1rm(st.weight,st.reps);if(v>best)best=v;}));
    return {ts:ses.startedAt,v:Math.round(best)};
  }).filter(p=>p.v>0).sort((a,b)=>a.ts-b.ts).map(p=>({label:dateShort(p.ts),v:p.v}));

  const bestW=Math.max(...rows.map(s=>s.weight));
  const best1=Math.round(Math.max(...rows.map(s=>e1rm(s.weight,s.reps))));
  const totalVol=Math.round(rows.reduce((a,s)=>a+s.reps*s.weight,0));
  const sessions=rel.length;

  return `<div class="stack">
    <div class="card">
      <label class="lbl">Oefening</label>
      <select id="progEx">${withData.map(e=>`<option value="${e.id}" ${e.id===exId?'selected':''}>${esc(e.name)}</option>`).join("")}</select>
    </div>
    <div class="grid2">
      ${statCard("🏅 Beste set",bestW+" kg","var(--molten)")}
      ${statCard("Gesch. 1RM",best1+" kg","var(--gold)")}
      ${statCard("Trainingen",sessions,"var(--steel)")}
      ${statCard("Totaal volume",totalVol+" kg","var(--steel)")}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">Geschatte 1RM over tijd</div>
      <div class="muted" style="font-size:11.5px;margin-bottom:10px;">Hoe hoger de lijn, hoe sterker je wordt</div>
      ${chartSVG(data)}
    </div>
  </div>`;
}
function statCard(l,v,col){ return `<div class="card" style="padding:13px;"><div class="stat-l" style="color:${col};">${l}</div><div class="num stat-v">${v}</div></div>`; }
function chartSVG(data){
  const W=320,H=200,pad=30;
  if(data.length===1) data=[{label:data[0].label,v:data[0].v},{label:data[0].label,v:data[0].v}];
  const vs=data.map(d=>d.v); let mn=Math.min(...vs),mx=Math.max(...vs); if(mn===mx){mn-=5;mx+=5;}
  const x=i=>pad+(i/(data.length-1))*(W-pad-8);
  const y=v=>H-pad-((v-mn)/(mx-mn))*(H-pad-14);
  const pts=data.map((d,i)=>x(i)+","+y(d.v)).join(" ");
  const dots=data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.v)}" r="3" fill="var(--molten)"></circle>`).join("");
  const idxs=[0,Math.floor((data.length-1)/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  const xl=idxs.map(i=>`<text x="${x(i)}" y="${H-8}" fill="var(--muted)" font-size="10" text-anchor="middle">${data[i].label}</text>`).join("");
  const yl=[mx,Math.round((mx+mn)/2),mn].map(v=>`<text x="4" y="${y(v)+3}" fill="var(--muted)" font-size="10">${v}</text>`).join("");
  const grid=[mx,Math.round((mx+mn)/2),mn].map(v=>`<line x1="${pad}" y1="${y(v)}" x2="${W-8}" y2="${y(v)}" stroke="var(--line)" stroke-dasharray="3 3"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;">
    ${grid}${yl}
    <polyline points="${pts}" fill="none" stroke="var(--molten)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xl}
  </svg>`;
}

/* ---------------- event wiring ---------------- */
function wire(){
  // live timer
  if(window.__timer) clearInterval(window.__timer);
  if(S.active && document.getElementById("sessTimer")){
    const upd=()=>{const e=document.getElementById("sessTimer"); if(e&&S.active) e.textContent=liveDur(Date.now()-S.active.startedAt); else clearInterval(window.__timer);};
    upd(); window.__timer=setInterval(upd,1000);
  }

  document.getElementById("nav").querySelectorAll("button").forEach(btn=>{
    btn.onclick=()=>{ S.ui.tab=btn.dataset.tab; S.ui.editor=null; render(); };
  });
  const bn=document.querySelector("[data-resume]"); if(bn) bn.onclick=()=>{S.ui.tab="train";render();};
  const c=document.getElementById("content");

  // start screen
  c.querySelectorAll("[data-ss]").forEach(b=>b.onclick=()=>{S.ui.startSchema=b.dataset.ss;render();});
  const startBtn=c.querySelector("[data-start]"); if(startBtn) startBtn.onclick=()=>startTraining(S.ui.startSchema);
  const tj=c.querySelector("[data-tabjump]"); if(tj) tj.onclick=()=>{S.ui.tab=tj.dataset.tabjump;render();};

  // active session
  const fin=c.querySelector("[data-finish]"); if(fin) fin.onclick=()=>finishTraining();
  const dis=c.querySelector("[data-discard]"); if(dis) dis.onclick=()=>{ if(confirm("Deze training weggooien? Niets wordt opgeslagen.")) discardTraining(); };
  const addexBtn=c.querySelector("[data-addex]"); const addexSel=c.querySelector("#addExSel");
  if(addexBtn&&addexSel) addexBtn.onclick=()=>{ if(addexSel.value){activeAddExercise(addexSel.value);render();} };
  const addnew=c.querySelector("[data-addnewex]"); const newInline=c.querySelector("#newExInline");
  if(addnew&&newInline) addnew.onclick=()=>{ const id=addExercise(newInline.value); if(id){activeAddExercise(id);render();} };
  c.querySelectorAll("[data-rment]").forEach(b=>b.onclick=()=>{activeRemoveEntry(b.dataset.rment);render();});
  c.querySelectorAll("[data-delset]").forEach(b=>b.onclick=()=>{const[ex,sid]=b.dataset.delset.split("|");activeDelSet(ex,sid);render();});
  // reps onthouden tijdens her-render (bv. bij platen tikken)
  c.querySelectorAll("input[data-reps]").forEach(inp=>inp.oninput=()=>{S.ui.reps[inp.dataset.reps]=inp.value;});
  // platen bouwen
  c.querySelectorAll("[data-plate]").forEach(b=>b.onclick=()=>{const[ex,p]=b.dataset.plate.split("|");(S.ui.plates[ex]=S.ui.plates[ex]||[]).push(parseFloat(p));render();});
  c.querySelectorAll("[data-rmplate]").forEach(b=>b.onclick=()=>{const[ex,i]=b.dataset.rmplate.split("|");if(S.ui.plates[ex])S.ui.plates[ex].splice(+i,1);render();});
  c.querySelectorAll("[data-clearp]").forEach(b=>b.onclick=()=>{S.ui.plates[b.dataset.clearp]=[];render();});
  c.querySelectorAll("[data-addsetto]").forEach(b=>b.onclick=()=>{
    const ex=b.dataset.addsetto;
    const exObj=S.exercises.find(e=>e.id===ex)||{};
    const r=parseInt((c.querySelector("#reps_"+CSS.escape(ex))||{}).value,10);
    if(!r) return;
    let w, plates=null, bar=null;
    if(isBar(exObj)){
      const stack=(S.ui.plates[ex]||[]); bar=exObj.bar; w=plateTotal(bar,stack); plates=stack.slice();
    } else {
      w=parseFloat((c.querySelector("#weight_"+CSS.escape(ex))||{}).value);
      if(isNaN(w)) return;
    }
    const pr=activeAddSet(ex,r,w,plates,bar);
    S.ui.reps[ex]=""; if(plates) S.ui.plates[ex]=[];
    render();
    if(pr) toast("🏅 Nieuw persoonlijk record!");
  });

  // history
  c.querySelectorAll("[data-togsess]").forEach(b=>b.onclick=()=>{S.ui.openSession=S.ui.openSession===b.dataset.togsess?null:b.dataset.togsess;render();});
  c.querySelectorAll("[data-delsess]").forEach(b=>b.onclick=()=>{ if(confirm("Deze training definitief verwijderen?")){deleteSession(b.dataset.delsess);render();} });

  // schemas
  const newW=c.querySelector("[data-neww]"); if(newW) newW.onclick=()=>{S.ui.editor={id:uid(),name:"",ids:[],existing:false};render();};
  c.querySelectorAll("[data-editw]").forEach(b=>b.onclick=()=>{const w=S.schemas.find(x=>x.id===b.dataset.editw);S.ui.editor={id:w.id,name:w.name,ids:[...w.exerciseIds],existing:true};render();});
  const wname=c.querySelector("#wname"); if(wname) wname.oninput=()=>{S.ui.editor.name=wname.value;};
  const addw=c.querySelector("[data-addw]"); if(addw) addw.onclick=()=>{const p=c.querySelector("#wpick").value; if(p&&!S.ui.editor.ids.includes(p)){S.ui.editor.ids.push(p);render();}};
  c.querySelectorAll("[data-rmw]").forEach(b=>b.onclick=()=>{S.ui.editor.ids=S.ui.editor.ids.filter(x=>x!==b.dataset.rmw);render();});
  c.querySelectorAll("[data-mv]").forEach(b=>b.onclick=()=>{const[i,dir]=b.dataset.mv.split("|").map(Number);const j=i+dir;const ids=S.ui.editor.ids;if(j<0||j>=ids.length)return;[ids[i],ids[j]]=[ids[j],ids[i]];render();});
  const cancelw=c.querySelector("[data-cancelw]"); if(cancelw) cancelw.onclick=()=>{S.ui.editor=null;render();};
  const savew=c.querySelector("[data-savew]"); if(savew) savew.onclick=()=>{const ed=S.ui.editor;const nm=(c.querySelector("#wname").value||"").trim();if(!nm||!ed.ids.length)return;saveSchema({id:ed.id,name:nm,exerciseIds:ed.ids});S.ui.editor=null;render();};
  const delw=c.querySelector("[data-delw]"); if(delw) delw.onclick=()=>{deleteSchema(S.ui.editor.id);S.ui.editor=null;render();};

  // exercises
  const addExBtn=c.querySelector("#addEx");
  if(addExBtn){ const doAdd=()=>{const inp=c.querySelector("#newEx");if(addExercise(inp.value)!==null){render();}}; addExBtn.onclick=doAdd; c.querySelector("#newEx").onkeydown=e=>{if(e.key==="Enter")doAdd();}; }
  c.querySelectorAll("[data-rmex]").forEach(b=>b.onclick=()=>{ if(confirm("Oefening verwijderen? De gelogde sets ervan in je historie verdwijnen ook.")){removeExercise(b.dataset.rmex);render();} });
  c.querySelectorAll("[data-togbar]").forEach(b=>b.onclick=()=>{S.ui.openEx=S.ui.openEx===b.dataset.togbar?null:b.dataset.togbar;render();});
  c.querySelectorAll("[data-setbar]").forEach(b=>b.onclick=()=>{const[id,v]=b.dataset.setbar.split("|");setExerciseBar(id, v==="none"?null:parseFloat(v));render();});
  c.querySelectorAll("[data-barcustom]").forEach(b=>b.onclick=()=>{const id=b.dataset.barcustom;const v=parseFloat((c.querySelector("#barcustom_"+CSS.escape(id))||{}).value);if(!isNaN(v)){setExerciseBar(id,v);render();}});
  c.querySelectorAll("[data-togplate]").forEach(b=>b.onclick=()=>{const p=parseFloat(b.dataset.togplate);const i=S.settings.plates.indexOf(p);if(i>=0)S.settings.plates.splice(i,1);else S.settings.plates.push(p);S.settings.plates.sort((a,b)=>b-a);save();render();});
  const defbar=c.querySelector("[data-defbar]"); if(defbar) defbar.onclick=()=>{const v=parseFloat((c.querySelector("#defbar")||{}).value);if(!isNaN(v)){S.settings.bar=v;save();render();}};
  const search=c.querySelector("#search");
  if(search) search.oninput=()=>{const q=search.value.toLowerCase();c.querySelectorAll("#exlist .exitem").forEach((row,i)=>{row.style.display=S.exercises[i].name.toLowerCase().includes(q)?"":"none";});};
  const expBtn=c.querySelector("#exportBtn"); if(expBtn) expBtn.onclick=exportData;
  const impBtn=c.querySelector("#importBtn"); const impFile=c.querySelector("#importFile");
  if(impBtn&&impFile){ impBtn.onclick=()=>impFile.click(); impFile.onchange=()=>{if(impFile.files[0])importData(impFile.files[0]);}; }

  // progress
  const progSel=c.querySelector("#progEx"); if(progSel) progSel.onchange=()=>{S.ui.progEx=progSel.value;render();};
}

render();
</script>
</body>
</html>
