<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15110E">
<title>Iron Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --bg:#15110E;--surface:#1F1A16;--surface2:#26201B;--line:#3A322B;
    --text:#F2EAE0;--muted:#9B8E80;--molten:#FF5A2C;--steel:#5FA8C9;--gold:#E8B23A;--danger:#E0573E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,-apple-system,sans-serif;}
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:env(safe-area-inset-bottom);}
  .num{font-family:'Oswald',system-ui,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
  input,select,button{font-family:inherit;}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 12px;font-size:15px;}
  ::placeholder{color:var(--muted);opacity:1;}
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--molten);outline-offset:1px;}
  label.lbl{display:block;font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:500;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;}
  .stack{display:grid;gap:14px;}
  .row{display:flex;gap:10px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:9px;
    padding:12px 14px;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--molten);color:#1a0d06;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line);font-weight:500;font-size:14px;padding:11px 14px;}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:grid;place-items:center;line-height:0;}
  .muted{color:var(--muted);}
  header.top{padding:22px 16px 14px;display:flex;align-items:center;gap:10px;}
  .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--molten);color:#1a0d06;font-size:18px;}
  .content{padding:0 16px 100px;}
  nav.bottom{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(21,17,14,.94);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(14px + env(safe-area-inset-bottom));}
  nav.bottom button{flex:1;background:none;border:none;cursor:pointer;color:var(--muted);display:grid;
    justify-items:center;gap:4px;padding:6px 0;font-size:10.5px;font-weight:500;}
  nav.bottom button.active{color:var(--molten);font-weight:600;}
  nav.bottom .ic{font-size:19px;line-height:1;}
  .chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:var(--surface);color:var(--muted);}
  .chip.active{border-color:var(--molten);background:rgba(255,90,44,.14);color:var(--molten);}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .setrow{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:7px 10px;}
  .listrow{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:9px 11px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-l{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;}
  .stat-v{font-size:24px;font-weight:700;margin-top:4px;}
  .banner{margin:0 16px 12px;padding:10px 12px;border-radius:10px;font-size:12.5px;display:flex;gap:8px;align-items:center;}
  .banner-ok{background:rgba(95,168,201,.12);border:1px solid var(--steel);color:#bfe2f0;}
  .banner-err{background:rgba(224,87,62,.12);border:1px solid var(--danger);color:#F3B4A6;}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--surface2);
    border:1px solid var(--line);color:var(--steel);padding:7px 13px;border-radius:20px;font-size:12.5px;
    font-weight:500;z-index:30;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div id="root">
  <header class="top">
    <div class="logo">🏋</div>
    <div>
      <div class="num" id="title" style="font-size:22px;font-weight:700;line-height:1;">Vandaag</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">IRON LOG</div>
    </div>
  </header>
  <div id="banner"></div>
  <div class="content" id="content"></div>
  <nav class="bottom" id="nav"></nav>
</div>
<div class="toast" id="toast">✓ Opgeslagen</div>

<script>
"use strict";

/* ---------------- storage (localStorage) ---------------- */
const KEY = "ironlog_v1";
let storageOK = true;
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return {exercises:[],sets:[],workouts:[]};
    return JSON.parse(raw);
  }catch(e){ storageOK=false; return {exercises:[],sets:[],workouts:[]}; }
}
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify({exercises:S.exercises,sets:S.sets,workouts:S.workouts}));
    storageOK=true; showToast();
  }catch(e){ storageOK=false; render(); }
}
function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>t.classList.remove("show"),1500);
}

/* ---------------- helpers ---------------- */
const uid = ()=> (crypto.randomUUID? crypto.randomUUID() : String(Date.now()+Math.random()));
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtDate(k){const p=k.split("-");return p[2]+"/"+p[1];}
const e1rm=(w,r)=> r<=1? w : w*(1+r/30);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

const STARTER=["Bench press","Squat","Deadlift","Overhead press","Barbell row","Pull-up","Lat pulldown","Biceps curl","Triceps pushdown","Leg press"];

/* ---------------- state ---------------- */
let S = load();
if(!S.exercises || !S.exercises.length){
  S.exercises = STARTER.map(n=>({id:uid(),name:n}));
  S.sets=S.sets||[]; S.workouts=S.workouts||[];
  save();
}
S.ui = { tab:"log", workoutFilter:"", logEx:(S.exercises[0]||{}).id||"", progEx:"", editor:null };

/* ---------------- mutations ---------------- */
function addSet(exId,reps,weight){
  const prevBest = Math.max(0,...S.sets.filter(s=>s.exerciseId===exId).map(s=>e1rm(s.weight,s.reps)));
  const isPR = e1rm(weight,reps) > prevBest+0.01;
  S.sets.push({id:uid(),date:todayKey(),exerciseId:exId,reps,weight});
  save();
  return isPR;
}
function delSet(id){ S.sets=S.sets.filter(s=>s.id!==id); save(); }
function addExercise(name){
  if(S.exercises.some(e=>e.name.toLowerCase()===name.toLowerCase())) return;
  S.exercises.push({id:uid(),name}); save();
}
function removeExercise(id){ S.exercises=S.exercises.filter(e=>e.id!==id); S.sets=S.sets.filter(s=>s.exerciseId!==id); save(); }
function saveWorkout(wk){
  const i=S.workouts.findIndex(w=>w.id===wk.id);
  if(i>=0) S.workouts[i]=wk; else S.workouts.push(wk);
  save();
}
function deleteWorkout(id){ S.workouts=S.workouts.filter(w=>w.id!==id); save(); }

/* ---------------- export / import ---------------- */
function exportData(){
  const blob=new Blob([JSON.stringify({exercises:S.exercises,sets:S.sets,workouts:S.workouts},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="iron-log-backup.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.exercises) S.exercises=d.exercises;
      if(d.sets) S.sets=d.sets;
      if(d.workouts) S.workouts=d.workouts;
      save(); S.ui.editor=null; render();
    }catch(e){ alert("Kon dit bestand niet lezen."); }
  };
  r.readAsText(file);
}

/* ---------------- nav ---------------- */
const TABS=[
  {id:"log",label:"Loggen",ic:"＋"},
  {id:"workouts",label:"Schema's",ic:"▤"},
  {id:"progress",label:"Grafiek",ic:"📈"},
  {id:"exercises",label:"Oefeningen",ic:"≣"},
];
const TITLES={log:"Vandaag",workouts:"Schema's",progress:"Vooruitgang",exercises:"Oefeningen"};

/* ---------------- render ---------------- */
function render(){
  document.getElementById("title").textContent=TITLES[S.ui.tab];
  // banner
  const b=document.getElementById("banner");
  b.innerHTML = storageOK
    ? ""
    : '<div class="banner banner-err">⚠ Opslaan lukt niet in deze browser. Gebruik de back-up-knop onderaan "Oefeningen" om je data als bestand te bewaren.</div>';

  // nav
  document.getElementById("nav").innerHTML = TABS.map(t=>
    `<button data-tab="${t.id}" class="${S.ui.tab===t.id?'active':''}"><span class="ic">${t.ic}</span>${t.label}</button>`
  ).join("");

  const c=document.getElementById("content");
  if(S.ui.tab==="log") c.innerHTML=viewLog();
  else if(S.ui.tab==="workouts") c.innerHTML = S.ui.editor? viewEditor() : viewWorkouts();
  else if(S.ui.tab==="progress") c.innerHTML=viewProgress();
  else c.innerHTML=viewExercises();

  wire();
}

/* ---------- LOG ---------- */
function viewLog(){
  const today=todayKey();
  const wf=S.ui.workoutFilter;
  const aw=S.workouts.find(w=>w.id===wf);
  const pool = aw? aw.exerciseIds.map(id=>S.exercises.find(e=>e.id===id)).filter(Boolean) : S.exercises;
  if(pool.length && !pool.some(e=>e.id===S.ui.logEx)) S.ui.logEx=pool[0].id;

  const todays=S.sets.filter(s=>s.date===today);
  const vol=Math.round(todays.reduce((a,s)=>a+s.reps*s.weight,0));

  // vorige keer
  const prior=S.sets.filter(s=>s.exerciseId===S.ui.logEx && s.date!==today);
  let lastHtml="";
  if(prior.length){
    const ld=prior.map(s=>s.date).sort().pop();
    const day=prior.filter(s=>s.date===ld);
    lastHtml=`<div style="margin-top:10px;font-size:12.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;">
      <span style="color:var(--steel);font-weight:600;">Vorige keer (${fmtDate(ld)}): </span>${day.map(s=>s.reps+"×"+s.weight+"kg").join("  ·  ")}</div>`;
  }

  // groep vandaag
  const groups={};
  todays.forEach(s=>{(groups[s.exerciseId]=groups[s.exerciseId]||[]).push(s);});
  const nameOf=id=>{const e=S.exercises.find(x=>x.id===id);return e?e.name:"?";};
  let sessHtml;
  const keys=Object.keys(groups);
  if(!keys.length){ sessHtml=`<div class="muted" style="font-size:13px;margin-top:12px;">Nog niets gelogd. Voeg je eerste set toe hierboven.</div>`; }
  else{
    sessHtml=`<div class="stack" style="margin-top:12px;">`+keys.map(id=>`
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${esc(nameOf(id))}</div>
        <div class="stack" style="gap:5px;">
          ${groups[id].map((s,i)=>`<div class="setrow">
            <span class="muted" style="font-size:12px;width:18px;">${i+1}</span>
            <span class="num" style="font-size:16px;">${s.reps}<span class="muted" style="font-size:12px;"> reps</span></span>
            <span style="color:var(--line);">·</span>
            <span class="num" style="font-size:16px;">${s.weight}<span class="muted" style="font-size:12px;"> kg</span></span>
            <span class="muted" style="margin-left:auto;font-size:11px;">~${Math.round(e1rm(s.weight,s.reps))}kg 1RM</span>
            <button class="icon-btn" data-delset="${s.id}" aria-label="Verwijder">🗑</button>
          </div>`).join("")}
        </div>
      </div>`).join("")+`</div>`;
  }

  const chips = S.workouts.length? `<div class="chips">
      <button class="chip ${!wf?'active':''}" data-wf="">Vrij</button>
      ${S.workouts.map(w=>`<button class="chip ${wf===w.id?'active':''}" data-wf="${w.id}">${esc(w.name)}</button>`).join("")}
    </div>`:"";

  return `<div class="stack">
    ${chips}
    <div class="card">
      <label class="lbl">Oefening</label>
      <select id="logEx">${pool.map(e=>`<option value="${e.id}" ${e.id===S.ui.logEx?'selected':''}>${esc(e.name)}</option>`).join("")}</select>
      ${lastHtml}
      <div class="row" style="margin-top:12px;">
        <div style="flex:1;"><label class="lbl">Reps</label><input id="reps" inputmode="numeric" placeholder="aantal reps"></div>
        <div style="flex:1;"><label class="lbl">Gewicht</label><input id="weight" inputmode="decimal" placeholder="gewicht in kg"></div>
      </div>
      <button class="btn btn-primary" id="addSet" style="margin-top:12px;width:100%;">＋ Set toevoegen</button>
      <div id="pr" style="margin-top:10px;color:var(--gold);font-weight:600;font-size:13.5px;display:none;">🏅 Nieuw persoonlijk record!</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font-size:13px;font-weight:600;">Sessie vandaag</span>
        <span style="color:var(--molten);font-size:13px;">🔥 <span class="num" style="font-weight:700;">${vol}</span> <span class="muted" style="font-size:11px;">kg volume</span></span>
      </div>
      ${sessHtml}
    </div>
  </div>`;
}

/* ---------- WORKOUTS ---------- */
function viewWorkouts(){
  const list = S.workouts.length? S.workouts.map(w=>{
    const names=w.exerciseIds.map(id=>(S.exercises.find(e=>e.id===id)||{}).name).filter(Boolean);
    const sub=w.exerciseIds.length+" oefening"+(w.exerciseIds.length===1?"":"en")+(names.length?" · "+names.slice(0,3).join(", "):"")+(names.length>3?"…":"");
    return `<button class="card" data-editw="${w.id}" style="text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;"><div style="font-size:15px;font-weight:600;">${esc(w.name)}</div>
      <div class="muted" style="font-size:12px;margin-top:3px;">${esc(sub)}</div></div><span class="muted">✎</span></button>`;
  }).join("") : `<div class="card muted" style="text-align:center;padding:26px;font-size:13.5px;">Nog geen schema's. Stel er één samen met je vaste oefeningen — daarna kies je het snel bij het loggen.</div>`;
  return `<div class="stack">
    <button class="btn btn-primary" data-neww style="width:100%;">＋ Nieuw schema</button>
    <div class="stack">${list}</div>
  </div>`;
}
function viewEditor(){
  const ed=S.ui.editor;
  const inW=ed.ids.map(id=>S.exercises.find(e=>e.id===id)).filter(Boolean);
  const avail=S.exercises.filter(e=>!ed.ids.includes(e.id));
  const rows = inW.length? inW.map((e,i)=>`<div class="setrow" style="background:var(--surface2);">
      <span class="num" style="color:var(--molten);width:20px;font-weight:700;">${i+1}</span>
      <span style="flex:1;font-size:14px;">${esc(e.name)}</span>
      <button class="icon-btn" data-mv="${i}|-1">▲</button>
      <button class="icon-btn" data-mv="${i}|1">▼</button>
      <button class="icon-btn" data-rmw="${e.id}" style="color:var(--danger);">✕</button>
    </div>`).join("") : `<div class="muted" style="font-size:13px;padding:4px 0 10px;">Nog geen oefeningen toegevoegd.</div>`;
  const canSave = ed.name.trim() && ed.ids.length>0;
  return `<div class="stack">
    <div class="card">
      <label class="lbl">Naam van het schema</label>
      <input id="wname" placeholder="bv. Push dag / Benen" value="${esc(ed.name)}">
    </div>
    <div class="card">
      <label class="lbl">Oefeningen in dit schema</label>
      <div class="stack" style="gap:6px;margin-bottom:12px;">${rows}</div>
      <div class="row">
        <select id="wpick"><option value="">Oefening kiezen…</option>${avail.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join("")}</select>
        <button class="btn btn-ghost" data-addw style="padding:0 16px;">＋</button>
      </div>
    </div>
    <div class="row">
      <button class="btn btn-ghost" data-cancelw style="flex:1;">Annuleren</button>
      <button class="btn btn-primary" data-savew style="flex:1;opacity:${canSave?1:.5};">✓ Opslaan</button>
    </div>
    ${ed.existing? `<button class="btn btn-ghost" data-delw style="color:var(--danger);border-color:rgba(224,87,62,.4);">🗑 Schema verwijderen</button>`:""}
  </div>`;
}

/* ---------- EXERCISES ---------- */
function viewExercises(){
  const count=id=>S.sets.filter(s=>s.exerciseId===id).length;
  return `<div class="stack">
    <div class="card">
      <label class="lbl">Nieuwe oefening</label>
      <div class="row"><input id="newEx" placeholder="bv. Romanian deadlift"><button class="btn btn-primary" id="addEx" style="padding:0 16px;">＋</button></div>
    </div>
    <div class="card">
      <input id="search" placeholder="Zoeken…" style="margin-bottom:12px;">
      <div class="stack" id="exlist" style="gap:6px;">
        ${S.exercises.map(e=>`<div class="listrow">
          <span style="font-size:14px;font-weight:500;">${esc(e.name)}</span>
          <span class="muted" style="margin-left:auto;font-size:11.5px;">${count(e.id)} sets</span>
          <button class="icon-btn" data-rmex="${e.id}" aria-label="Verwijder">🗑</button></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <label class="lbl">Back-up van je data</label>
      <div class="muted" style="font-size:12.5px;margin-bottom:10px;">Bewaar al je gegevens als bestand, of zet een back-up terug. Handig bij een nieuwe telefoon.</div>
      <div class="row">
        <button class="btn btn-ghost" id="exportBtn" style="flex:1;">⬇ Exporteren</button>
        <button class="btn btn-ghost" id="importBtn" style="flex:1;">⬆ Importeren</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>`;
}

/* ---------- PROGRESS ---------- */
function viewProgress(){
  const withData=S.exercises.filter(e=>S.sets.some(s=>s.exerciseId===e.id));
  if(!withData.length) return `<div class="card muted" style="text-align:center;padding:30px;">Nog geen data. Log eerst een paar sets, dan verschijnt hier je curve.</div>`;
  if(!S.ui.progEx || !withData.some(e=>e.id===S.ui.progEx)) S.ui.progEx=withData[0].id;
  const exId=S.ui.progEx;
  const rows=S.sets.filter(s=>s.exerciseId===exId);

  const byDate={};
  rows.forEach(s=>{const k=s.date;const est=e1rm(s.weight,s.reps);
    if(!byDate[k]) byDate[k]={date:k,e1rm:est}; else byDate[k].e1rm=Math.max(byDate[k].e1rm,est);});
  const data=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({label:fmtDate(d.date),v:Math.round(d.e1rm)}));

  const bestW=Math.max(...rows.map(s=>s.weight));
  const best1=Math.round(Math.max(...rows.map(s=>e1rm(s.weight,s.reps))));
  const totalVol=Math.round(rows.reduce((a,s)=>a+s.reps*s.weight,0));
  const sessions=new Set(rows.map(s=>s.date)).size;

  return `<div class="stack">
    <div class="card">
      <label class="lbl">Oefening</label>
      <select id="progEx">${withData.map(e=>`<option value="${e.id}" ${e.id===exId?'selected':''}>${esc(e.name)}</option>`).join("")}</select>
    </div>
    <div class="grid2">
      ${statCard("🏅 Beste set",bestW+" kg","var(--molten)")}
      ${statCard("Gesch. 1RM",best1+" kg","var(--gold)")}
      ${statCard("Sessies",sessions,"var(--steel)")}
      ${statCard("Totaal volume",totalVol+" kg","var(--steel)")}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">Geschatte 1RM over tijd</div>
      <div class="muted" style="font-size:11.5px;margin-bottom:10px;">Hoe hoger de lijn, hoe sterker je wordt</div>
      ${chartSVG(data)}
    </div>
  </div>`;
}
function statCard(l,v,col){
  return `<div class="card" style="padding:13px;"><div class="stat-l" style="color:${col};">${l}</div><div class="num stat-v">${v}</div></div>`;
}
function chartSVG(data){
  const W=320,H=200,pad=30;
  if(data.length===1){ // enkel punt
    data=[{label:data[0].label,v:data[0].v},{label:data[0].label,v:data[0].v}];
  }
  const vs=data.map(d=>d.v);
  let mn=Math.min(...vs),mx=Math.max(...vs);
  if(mn===mx){mn=mn-5;mx=mx+5;}
  const x=i=>pad+(i/(data.length-1))*(W-pad-8);
  const y=v=>H-pad-((v-mn)/(mx-mn))*(H-pad-14);
  const pts=data.map((d,i)=>x(i)+","+y(d.v)).join(" ");
  const dots=data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.v)}" r="3" fill="var(--molten)"></circle>`).join("");
  // x labels: eerste, midden, laatste
  const idxs=[0,Math.floor((data.length-1)/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i);
  const xl=idxs.map(i=>`<text x="${x(i)}" y="${H-8}" fill="var(--muted)" font-size="10" text-anchor="middle">${data[i].label}</text>`).join("");
  const yl=[mx,Math.round((mx+mn)/2),mn].map((v,i)=>`<text x="4" y="${y(v)+3}" fill="var(--muted)" font-size="10">${v}</text>`).join("");
  const grid=[mx,Math.round((mx+mn)/2),mn].map(v=>`<line x1="${pad}" y1="${y(v)}" x2="${W-8}" y2="${y(v)}" stroke="var(--line)" stroke-dasharray="3 3"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;">
    ${grid}${yl}
    <polyline points="${pts}" fill="none" stroke="var(--molten)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xl}
  </svg>`;
}

/* ---------------- event wiring ---------------- */
function wire(){
  // nav
  document.getElementById("nav").querySelectorAll("button").forEach(btn=>{
    btn.onclick=()=>{ S.ui.tab=btn.dataset.tab; S.ui.editor=null; render(); };
  });
  const c=document.getElementById("content");

  // workout filter chips
  c.querySelectorAll("[data-wf]").forEach(b=>b.onclick=()=>{S.ui.workoutFilter=b.dataset.wf;render();});

  // log
  const logSel=c.querySelector("#logEx");
  if(logSel) logSel.onchange=()=>{S.ui.logEx=logSel.value;render();};
  const addSetBtn=c.querySelector("#addSet");
  if(addSetBtn) addSetBtn.onclick=()=>{
    const r=parseInt(c.querySelector("#reps").value,10);
    const w=parseFloat(c.querySelector("#weight").value);
    if(!S.ui.logEx||!r||isNaN(w)) return;
    const pr=addSet(S.ui.logEx,r,w);
    render();
    if(pr){const el=document.getElementById("pr"); if(el){el.style.display="block"; setTimeout(()=>{if(el)el.style.display="none";},2200);}}
  };
  c.querySelectorAll("[data-delset]").forEach(b=>b.onclick=()=>{delSet(b.dataset.delset);render();});

  // workouts
  const newW=c.querySelector("[data-neww]");
  if(newW) newW.onclick=()=>{S.ui.editor={id:uid(),name:"",ids:[],existing:false};render();};
  c.querySelectorAll("[data-editw]").forEach(b=>b.onclick=()=>{
    const w=S.workouts.find(x=>x.id===b.dataset.editw);
    S.ui.editor={id:w.id,name:w.name,ids:[...w.exerciseIds],existing:true};render();
  });
  // editor
  const wname=c.querySelector("#wname");
  if(wname) wname.oninput=()=>{S.ui.editor.name=wname.value;}; // geen re-render -> focus blijft
  const addw=c.querySelector("[data-addw]");
  if(addw) addw.onclick=()=>{const p=c.querySelector("#wpick").value; if(p&&!S.ui.editor.ids.includes(p)){S.ui.editor.ids.push(p);render();}};
  c.querySelectorAll("[data-rmw]").forEach(b=>b.onclick=()=>{S.ui.editor.ids=S.ui.editor.ids.filter(x=>x!==b.dataset.rmw);render();});
  c.querySelectorAll("[data-mv]").forEach(b=>b.onclick=()=>{
    const [i,dir]=b.dataset.mv.split("|").map(Number); const j=i+dir; const ids=S.ui.editor.ids;
    if(j<0||j>=ids.length) return; [ids[i],ids[j]]=[ids[j],ids[i]]; render();
  });
  const cancelw=c.querySelector("[data-cancelw]"); if(cancelw) cancelw.onclick=()=>{S.ui.editor=null;render();};
  const savew=c.querySelector("[data-savew]"); if(savew) savew.onclick=()=>{
    const ed=S.ui.editor; const nm=(c.querySelector("#wname").value||"").trim();
    if(!nm||!ed.ids.length) return;
    saveWorkout({id:ed.id,name:nm,exerciseIds:ed.ids}); S.ui.editor=null; render();
  };
  const delw=c.querySelector("[data-delw]"); if(delw) delw.onclick=()=>{deleteWorkout(S.ui.editor.id);S.ui.editor=null;render();};

  // exercises
  const addExBtn=c.querySelector("#addEx");
  if(addExBtn){
    const doAdd=()=>{const inp=c.querySelector("#newEx");const n=(inp.value||"").trim();if(!n)return;addExercise(n);render();};
    addExBtn.onclick=doAdd;
    c.querySelector("#newEx").onkeydown=e=>{if(e.key==="Enter")doAdd();};
  }
  c.querySelectorAll("[data-rmex]").forEach(b=>b.onclick=()=>{removeExercise(b.dataset.rmex);render();});
  const search=c.querySelector("#search");
  if(search) search.oninput=()=>{
    const q=search.value.toLowerCase();
    c.querySelectorAll("#exlist .listrow").forEach((row,i)=>{
      row.style.display = S.exercises[i].name.toLowerCase().includes(q)?"":"none";
    });
  };
  const expBtn=c.querySelector("#exportBtn"); if(expBtn) expBtn.onclick=exportData;
  const impBtn=c.querySelector("#importBtn"); const impFile=c.querySelector("#importFile");
  if(impBtn&&impFile){ impBtn.onclick=()=>impFile.click(); impFile.onchange=()=>{if(impFile.files[0])importData(impFile.files[0]);}; }

  // progress
  const progSel=c.querySelector("#progEx"); if(progSel) progSel.onchange=()=>{S.ui.progEx=progSel.value;render();};
}

render();
</script>
</body>
</html>
